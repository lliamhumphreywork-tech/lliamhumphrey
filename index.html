<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lliam Humphrey</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.svg" />
  <meta name="description" content="19. Building businesses in public from South Africa. Entrepreneur · Creative Director · Founder." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,700&family=Inter+Tight:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; }
    body { background: #FAF8F3; -webkit-font-smoothing: antialiased; }
    @media (max-width: 768px) {
      .pill-nav-links { display: none !important; }
      .mobile-menu-btn { display: flex !important; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ─── Palette ────────────────────────────────────────────────────
    const T = {
      black:      '#FAF8F3',
      navy:       '#F2E9D8',
      navyMid:    '#E8DDC4',
      navyDeep:   '#0F1A14',
      silver:     '#E8753A',
      silverLight:'#0F1A14',
      silverDim:  '#5C6B5F',
      silverFaint:'#A89F8A',
      white:      '#0F1A14',
      orange:     '#E8753A',
      orangeSoft: '#F2A06B',
      beige:      '#F2E9D8',
      beigeDeep:  '#E8DDC4',
    };

    const grotesk = "'Inter Tight', 'Space Grotesk', sans-serif";
    const serif   = "'Fraunces', 'Cormorant Garamond', serif";

    // ─── Modal shared constants (module-level prevents focus-loss bug) ─
    const mAccent = '#E8753A', mBg = '#FFFFFF', mPanelBg = '#F2E9D8', mInk = '#0F1A14', mDim = '#5C6B5F', mFaint = '#A89F8A';
    const baseInput = { width:'100%', padding:'14px 0', background:'transparent', border:'none', borderBottom:`1px solid ${mAccent}55`, fontFamily:grotesk, fontSize:16, color:mInk, outline:'none', transition:'border-color .2s', boxSizing:'border-box' };
    const chipBase  = (sel) => ({ padding:'10px 16px', border:`1px solid ${sel?mAccent:mAccent+'33'}`, background:sel?mAccent:'transparent', color:sel?'#fff':mInk, fontFamily:grotesk, fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', fontWeight:500, cursor:'pointer', transition:'all .2s' });
    const Field = ({ label, hint, optional, children }) => (
      <label style={{ display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
          <span style={{ fontFamily:grotesk, fontSize:9, letterSpacing:'0.32em', textTransform:'uppercase', fontWeight:500, color:mAccent }}>{label}{optional&&<span style={{ marginLeft:8, color:mFaint }}>(optional)</span>}</span>
          {hint&&<span style={{ fontSize:10, color:mFaint, letterSpacing:'0.12em' }}>{hint}</span>}
        </div>
        {children}
      </label>
    );

    // ─── SVG noise ──────────────────────────────────────────────────
    const NoiseDefs = () => (
      <svg width="0" height="0" style={{ position:'absolute' }}>
        <filter id="nf-shared">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
          <feColorMatrix type="saturate" values="0" />
        </filter>
      </svg>
    );
    const NoiseBg = ({ opacity = 0.035 }) => (
      <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', pointerEvents:'none', zIndex:0 }}>
        <rect width="100%" height="100%" filter="url(#nf-shared)" opacity={opacity} />
      </svg>
    );

    // ─── HeroMark ───────────────────────────────────────────────────
    const HeroMark = () => (
      <div style={{ width:100, height:100, borderRadius:26, position:'relative', background:'linear-gradient(155deg, rgba(242,233,216,0.18) 0%, rgba(232,221,196,0.12) 100%)', border:'1px solid rgba(232,117,58,0.4)', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 40px 120px -30px ${T.orange}44, inset 0 1px 0 rgba(255,255,255,0.2)`, backdropFilter:'blur(8px)' }}>
        <span style={{ position:'absolute', inset:5, borderRadius:20, background:`radial-gradient(circle at 50% 80%, ${T.orange}22, transparent 65%)`, pointerEvents:'none' }} />
        <span style={{ position:'absolute', top:11, left:0, right:0, textAlign:'center', fontSize:7, color:'rgba(242,233,216,0.55)', letterSpacing:'0.4em', textTransform:'uppercase', fontWeight:600, fontFamily:grotesk }}>est · mmxxiv</span>
        <span style={{ fontFamily:grotesk, fontSize:38, fontWeight:700, letterSpacing:'0.12em', color:T.beige, position:'relative', marginTop:12 }}>LH</span>
      </div>
    );

    // ─── Wordmark ───────────────────────────────────────────────────
    const Wordmark = () => (
      <div style={{ display:'flex', alignItems:'center', gap:12 }}>
        <span style={{ width:28, height:28, background:T.navy, position:'relative', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <span style={{ position:'absolute', top:0, left:0, right:0, height:1.5, background:T.silver }}></span>
          <span style={{ fontFamily:grotesk, fontSize:8.5, fontWeight:700, letterSpacing:1.2, color:T.white }}>LH</span>
        </span>
        <span style={{ fontFamily:grotesk, fontSize:13, fontWeight:700, letterSpacing:'0.32em', color:T.white, textTransform:'uppercase' }}>Lliam Humphrey</span>
      </div>
    );

    // ─── Button styles ──────────────────────────────────────────────
    const pillBtnPrimary = { fontFamily:grotesk, fontSize:11, fontWeight:500, padding:'12px 22px', border:'none', borderRadius:999, background:T.orange, color:T.beige, cursor:'pointer', letterSpacing:'0.2em', textTransform:'uppercase', boxShadow:`0 1px 0 #ffffff44 inset, 0 12px 30px -10px ${T.orange}88`, transition:'transform .2s, box-shadow .2s' };
    const pillBtnLarge   = { ...pillBtnPrimary, fontSize:12, padding:'17px 32px' };
    const pillBtnGhost   = { fontFamily:grotesk, fontSize:12, fontWeight:500, padding:'17px 32px', borderRadius:999, background:'linear-gradient(180deg, rgba(232,221,196,0.25), rgba(242,233,216,0.2))', border:'1px solid rgba(242,233,216,0.35)', color:T.beige, cursor:'pointer', textDecoration:'none', letterSpacing:'0.2em', textTransform:'uppercase', boxShadow:'0 1px 0 rgba(255,255,255,0.15) inset', display:'inline-block', backdropFilter:'blur(8px)' };

    // ─── Nav (simplified — just logo + apply) ───────────────────────
    const PillNav = ({ onApply, scrolled }) => (
      <nav style={{ position:'sticky', top:33, zIndex:10, padding:'14px 24px', display:'flex', justifyContent:'space-between', alignItems:'center', gap:16, background:scrolled?'rgba(250,248,243,0.88)':'transparent', backdropFilter:scrolled?'blur(14px)':'none', borderBottom:scrolled?`1px solid ${T.silverFaint}44`:'1px solid transparent', transition:'all .3s' }}>
        <Wordmark />
        <button onClick={onApply} style={pillBtnPrimary}>Apply <span style={{ marginLeft:8 }}>→</span></button>
      </nav>
    );

    // ─── Hub Card ───────────────────────────────────────────────────
    const HubCard = ({ num, eyebrow, title, desc, cta, onCta, ctaHref, primary, bg, accent, ink, dim }) => {
      const cardBg     = bg     || T.navyDeep;
      const cardAccent = accent || T.orange;
      const cardInk    = ink    || T.beige;
      const cardDim    = dim    || T.silverDim;
      return (
        <div style={{ position:'relative', background:cardBg, border:`1px solid ${cardAccent}22`, padding:'clamp(28px,3.5vw,44px)', minHeight:420, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          <NoiseBg opacity={0.03} />
          <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:cardAccent }} />
          <div style={{ position:'relative', flex:1, display:'flex', flexDirection:'column' }}>
            <div style={{ fontSize:9, color:cardAccent, letterSpacing:'0.4em', textTransform:'uppercase', marginBottom:24, fontFamily:grotesk, fontWeight:500 }}>0{num} · {eyebrow}</div>
            <h3 style={{ fontFamily:grotesk, fontSize:'clamp(22px,2.8vw,36px)', fontWeight:700, letterSpacing:'-0.02em', margin:0, color:cardInk, lineHeight:1.08, textWrap:'balance' }}>{title}</h3>
            <p style={{ marginTop:18, fontSize:14, lineHeight:1.8, color:cardDim, fontFamily:grotesk, flex:1 }}>{desc}</p>
            <div style={{ marginTop:36 }}>
              {ctaHref ? (
                <a href={ctaHref} target="_blank" rel="noopener noreferrer" style={{ display:'inline-block', padding:'14px 24px', border:`1px solid ${cardAccent}`, background:'transparent', color:cardInk, fontSize:10, letterSpacing:'0.32em', textTransform:'uppercase', fontFamily:grotesk, fontWeight:500, textDecoration:'none', transition:'all .2s' }}>{cta} →</a>
              ) : (
                <button onClick={onCta} style={{ padding:'14px 24px', border:primary?'none':`1px solid ${cardAccent}`, background:primary?cardAccent:'transparent', color:primary?cardBg:cardInk, fontSize:10, letterSpacing:'0.32em', textTransform:'uppercase', fontFamily:grotesk, fontWeight:500, cursor:'pointer', transition:'all .2s' }}>{cta} →</button>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ─── Waitlist Modal ─────────────────────────────────────────────
    const WaitlistModal = ({ open, onClose }) => {
      const [email, setEmail] = useState('');
      const [name, setName]   = useState('');
      const [submitted, setSubmitted] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState(false);

      useEffect(() => { if (!open) setTimeout(() => { setEmail(''); setName(''); setSubmitted(false); setError(false); }, 400); }, [open]);
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape' && open) onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [open, onClose]);

      const submit = async (e) => {
        e.preventDefault();
        if (!email) return;
        setSubmitting(true);
        try {
          const res = await fetch('/api/brevo-subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, name })
          });
          if (!res.ok) throw new Error('failed');
          setSubmitted(true);
        } catch (_) {
          setError(true);
        } finally {
          setSubmitting(false);
        }
      };

      const accent = mAccent, bg = mBg, panelBg = mPanelBg, ink = mInk, dim = mDim;
      return (
        <>
          <div onClick={onClose} style={{ position:'fixed', inset:0, zIndex:100, background:'rgba(8,8,8,0.7)', backdropFilter:'blur(4px)', opacity:open?1:0, pointerEvents:open?'auto':'none', transition:'opacity .35s ease' }} />
          <aside style={{ position:'fixed', top:0, right:0, bottom:0, zIndex:101, width:'min(520px, 96vw)', background:bg, color:ink, fontFamily:grotesk, transform:open?'translateX(0)':'translateX(102%)', transition:'transform .5s cubic-bezier(.2,.7,.2,1)', display:'flex', flexDirection:'column', boxShadow:'-30px 0 80px rgba(0,0,0,0.6)', borderLeft:`1px solid ${accent}33`, overflow:'hidden' }}>
            <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:accent, zIndex:5 }} />
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'24px 32px', borderBottom:`1px solid ${accent}22`, fontFamily:grotesk, fontWeight:500, fontSize:10, letterSpacing:'0.32em', textTransform:'uppercase', color:dim }}>
              <span>Private Victories Club · Waitlist</span>
              <button onClick={onClose} style={{ border:'none', background:'transparent', color:ink, fontSize:18, cursor:'pointer', width:28, height:28, borderRadius:999, display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
            </div>
            <div style={{ flex:1, overflowY:'auto', padding:'40px 40px 32px' }}>
              {submitted ? (
                <div style={{ textAlign:'center', paddingTop:48 }}>
                  <div style={{ width:56, height:56, border:`1px solid ${accent}`, margin:'0 auto 28px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, color:accent }}>✓</div>
                  <div style={{ fontSize:9, color:accent, letterSpacing:'0.4em', textTransform:'uppercase', marginBottom:18 }}>You're on the list</div>
                  <h2 style={{ fontFamily:serif, fontStyle:'italic', fontWeight:300, fontSize:36, letterSpacing:'-0.015em', margin:0, color:ink }}>See you on the inside.</h2>
                  <p style={{ marginTop:22, color:dim, fontSize:14, lineHeight:1.7, maxWidth:340, marginInline:'auto' }}>We'll be in touch at <strong style={{ color:ink, fontWeight:500 }}>{email}</strong> when the doors open.</p>
                  <button onClick={onClose} style={{ marginTop:40, padding:'14px 26px', fontSize:10, border:`1px solid ${accent}33`, background:'transparent', color:ink, cursor:'pointer', fontFamily:grotesk, letterSpacing:'0.32em', textTransform:'uppercase', fontWeight:500 }}>Close</button>
                </div>
              ) : (
                <div style={{ animation:'apFade .4s ease both' }}>
                  <div style={{ fontSize:9, color:accent, letterSpacing:'0.4em', textTransform:'uppercase', marginBottom:16, fontWeight:500 }}>— The Community</div>
                  <h2 style={{ fontFamily:grotesk, fontWeight:700, fontSize:32, letterSpacing:'-0.02em', margin:0, lineHeight:1.05, textTransform:'uppercase', color:ink }}>Join the waitlist</h2>
                  <p style={{ marginTop:16, fontSize:14, lineHeight:1.75, color:dim, fontFamily:grotesk }}>
                    Private Victories Club is a creative community for young South Africans building in public and making money from their content. Drop your email and we'll let you know when doors open.
                  </p>
                  <form onSubmit={submit} style={{ marginTop:36, display:'flex', flexDirection:'column', gap:22 }}>
                    <Field label="Your name" optional><input value={name} onChange={(e)=>setName(e.target.value)} placeholder="Anya Reyes" style={baseInput} /></Field>
                    <Field label="Email address"><input type="email" value={email} onChange={(e)=>setEmail(e.target.value)} placeholder="anya@studio.com" required style={baseInput} /></Field>
                    {error && <p style={{ fontSize:12, color:'#c0392b', fontFamily:grotesk }}>Something went wrong — please try again.</p>}
                    <button type="submit" disabled={submitting||!email} style={{ marginTop:8, padding:'16px 24px', border:'none', background:email&&!submitting?accent:`${accent}55`, color:mBg, fontSize:10, letterSpacing:'0.32em', cursor:email&&!submitting?'pointer':'not-allowed', fontFamily:grotesk, fontWeight:500, textTransform:'uppercase', transition:'all .2s', opacity:submitting?0.7:1 }}>
                      {submitting ? 'Joining...' : 'Join the waitlist →'}
                    </button>
                  </form>
                </div>
              )}
            </div>
          </aside>
          <style>{`@keyframes apFade { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }`}</style>
        </>
      );
    };

    // ─── Application Modal ──────────────────────────────────────────
    const ApplicationModal = ({ open, onClose }) => {
      const [step, setStep]             = useState(0);
      const [data, setData]             = useState({ name:'', email:'', company:'', stage:'', kind:[], budget:'', timing:'', about:'' });
      const [submitted, setSubmitted]   = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [submitError, setSubmitError] = useState(false);

      useEffect(() => { if (!open) setTimeout(() => { setStep(0); setSubmitted(false); setSubmitError(false); }, 400); }, [open]);
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape' && open) onClose(); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [open, onClose]);

      const submit = async () => {
        setSubmitting(true);
        try {
          const res = await fetch('/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name:data.name, email:data.email, company:data.company, stage:data.stage, kind:data.kind, budget:data.budget, timing:data.timing, about:data.about })
          });
          if (!res.ok) throw new Error('failed');
          setSubmitted(true);
        } catch (_) {
          setSubmitError(true);
        } finally {
          setSubmitting(false);
        }
      };

      const setField   = (k,v) => setData((d) => ({ ...d, [k]:v }));
      const toggleKind = (k)   => setData((d) => ({ ...d, kind: d.kind.includes(k) ? d.kind.filter((x)=>x!==k) : [...d.kind,k] }));

      const accent = mAccent, bg = mBg, panelBg = mPanelBg, ink = mInk, dim = mDim, faint = mFaint;
      const steps = [
        { title:'About you',      label:'YOU' },
        { title:'About the work', label:'THE WORK' },
        { title:'Logistics',      label:'TIMING' },
        { title:'Review & send',  label:'REVIEW' },
      ];
      const canNext = (()=>{ if(step===0) return data.name&&data.email; if(step===1) return data.company&&data.kind.length>0; if(step===2) return data.budget&&data.timing; return true; })();

      return (
        <>
          <div onClick={onClose} style={{ position:'fixed', inset:0, zIndex:100, background:'rgba(8,8,8,0.7)', backdropFilter:'blur(4px)', opacity:open?1:0, pointerEvents:open?'auto':'none', transition:'opacity .35s ease' }} />
          <aside style={{ position:'fixed', top:0, right:0, bottom:0, zIndex:101, width:'min(640px, 96vw)', background:bg, color:ink, fontFamily:grotesk, transform:open?'translateX(0)':'translateX(102%)', transition:'transform .5s cubic-bezier(.2,.7,.2,1)', display:'flex', flexDirection:'column', boxShadow:'-30px 0 80px rgba(0,0,0,0.6)', borderLeft:`1px solid ${accent}33`, overflow:'hidden' }}>
            <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:accent, zIndex:5 }} />
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'24px 32px', borderBottom:`1px solid ${accent}22`, fontFamily:grotesk, fontWeight:500, fontSize:10, letterSpacing:'0.32em', textTransform:'uppercase', color:dim }}>
              <span>Application — {submitted?'Received':`Step ${Math.min(step+1,steps.length)} of ${steps.length}`}</span>
              <button onClick={onClose} style={{ border:'none', background:'transparent', color:ink, fontSize:18, cursor:'pointer', width:28, height:28, borderRadius:999, display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
            </div>
            {!submitted&&(
              <div style={{ display:'flex', borderBottom:`1px solid ${accent}22` }}>
                {steps.map((s,i)=>(
                  <div key={s.label} style={{ flex:1, padding:'16px 14px', fontSize:9, letterSpacing:'0.32em', textTransform:'uppercase', color:i===step?ink:faint, borderRight:i<steps.length-1?`1px solid ${accent}18`:'none', background:i===step?panelBg:'transparent', fontFamily:grotesk, fontWeight:500, position:'relative' }}>
                    <span style={{ color:i===step?accent:faint, marginRight:8 }}>0{i+1}</span>{s.label}
                    {i===step&&<div style={{ position:'absolute', bottom:-1, left:0, right:0, height:2, background:accent }} />}
                  </div>
                ))}
              </div>
            )}
            <div style={{ flex:1, overflowY:'auto', padding:'40px 40px 32px' }}>
              {submitted?(
                <div style={{ textAlign:'center', paddingTop:48 }}>
                  <div style={{ width:56, height:56, border:`1px solid ${accent}`, margin:'0 auto 28px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, color:accent }}>✓</div>
                  <div style={{ fontSize:9, color:accent, letterSpacing:'0.4em', textTransform:'uppercase', marginBottom:18 }}>Application Received</div>
                  <h2 style={{ fontFamily:serif, fontStyle:'italic', fontWeight:300, fontSize:38, letterSpacing:'-0.015em', margin:0, color:ink }}>Thank you, {data.name.split(' ')[0]||'friend'}.</h2>
                  <p style={{ marginTop:22, color:dim, fontSize:14, lineHeight:1.7, maxWidth:380, marginInline:'auto' }}>You'll hear back from Lliam within seven days, at <strong style={{ color:ink, fontWeight:500 }}>{data.email}</strong>.</p>
                  <button onClick={onClose} style={{ marginTop:40, padding:'14px 26px', fontSize:10, border:`1px solid ${accent}33`, background:'transparent', color:ink, cursor:'pointer', fontFamily:grotesk, letterSpacing:'0.32em', textTransform:'uppercase', fontWeight:500 }}>Close</button>
                </div>
              ):(
                <div key={step} style={{ animation:'apFade .4s ease both' }}>
                  <div style={{ fontFamily:grotesk, fontSize:9, letterSpacing:'0.4em', textTransform:'uppercase', color:accent, marginBottom:16, fontWeight:500 }}>— {steps[step].label}</div>
                  <h2 style={{ fontFamily:grotesk, fontWeight:700, fontSize:36, letterSpacing:'-0.02em', margin:0, lineHeight:1.05, textTransform:'uppercase', color:ink }}>{steps[step].title}</h2>
                  <div style={{ marginTop:36, display:'flex', flexDirection:'column', gap:22 }}>
                    {step===0&&(<>
                      <Field label="Your name"><input value={data.name} onChange={(e)=>setField('name',e.target.value)} placeholder="Anya Reyes" style={baseInput} /></Field>
                      <Field label="Email"><input type="email" value={data.email} onChange={(e)=>setField('email',e.target.value)} placeholder="anya@studio.com" style={baseInput} /></Field>
                      <Field label="Where can I see your work?" optional><input value={data.company} onChange={(e)=>setField('company',e.target.value)} placeholder="instagram.com/... or url" style={baseInput} /></Field>
                    </>)}
                    {step===1&&(<>
                      <Field label="Company / project name"><input value={data.company} onChange={(e)=>setField('company',e.target.value)} placeholder="Mareva Atelier" style={baseInput} /></Field>
                      <Field label="What stage are you at?"><div style={{ display:'flex', flexWrap:'wrap', gap:8, marginTop:4 }}>{['Idea','Building','Launched','Scaling'].map((o)=>(<button key={o} type="button" onClick={()=>setField('stage',o)} style={chipBase(data.stage===o)}>{o}</button>))}</div></Field>
                      <Field label="What kind of work do you need?" hint="Select any that apply"><div style={{ display:'flex', flexWrap:'wrap', gap:8, marginTop:4 }}>{['Identity','Art direction','Voice / messaging','Counsel','Editorial','Not sure yet'].map((o)=>{const sel=data.kind.includes(o);return(<button key={o} type="button" onClick={()=>toggleKind(o)} style={{ ...chipBase(sel), display:'inline-flex', alignItems:'center', gap:8 }}>{sel&&<span style={{ fontSize:10 }}>✓</span>}{o}</button>);})}</div></Field>
                    </>)}
                    {step===2&&(<>
                      <Field label="Budget range"><div style={{ display:'flex', flexWrap:'wrap', gap:8, marginTop:4 }}>{['$25 — 50k','$50 — 100k','$100 — 250k','$250k +'].map((o)=>(<button key={o} type="button" onClick={()=>setField('budget',o)} style={chipBase(data.budget===o)}>{o}</button>))}</div></Field>
                      <Field label="When would you like to begin?"><div style={{ display:'flex', flexWrap:'wrap', gap:8, marginTop:4 }}>{['Within a month','This quarter','Later this year','Flexible'].map((o)=>(<button key={o} type="button" onClick={()=>setField('timing',o)} style={chipBase(data.timing===o)}>{o}</button>))}</div></Field>
                      <Field label="Anything else worth knowing?" optional><textarea value={data.about} onChange={(e)=>setField('about',e.target.value)} placeholder="What you're building, what feels off, what success would look like." rows={4} style={{ ...baseInput, resize:'vertical', lineHeight:1.55, padding:'12px 0' }} /></Field>
                    </>)}
                    {step===3&&(
                      <div style={{ display:'flex', flexDirection:'column', gap:0, fontSize:14 }}>
                        {[['Name',data.name],['Email',data.email],['Company',data.company],['Stage',data.stage||'—'],['Need',data.kind.join(', ')||'—'],['Budget',data.budget],['Timing',data.timing],['Notes',data.about||'—']].map(([k,v])=>(
                          <div key={k} style={{ display:'grid', gridTemplateColumns:'140px 1fr', gap:16, padding:'14px 0', borderTop:`1px solid ${accent}18` }}>
                            <span style={{ fontFamily:grotesk, fontSize:9, letterSpacing:'0.32em', textTransform:'uppercase', color:dim, paddingTop:4, fontWeight:500 }}>{k}</span>
                            <span style={{ color:ink, lineHeight:1.5, fontSize:14, fontFamily:serif, fontStyle:'italic', fontWeight:300 }}>{v}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
            {!submitted&&(
              <div style={{ padding:'20px 32px', borderTop:`1px solid ${accent}22`, display:'flex', justifyContent:'space-between', alignItems:'center', background:panelBg }}>
                <button onClick={()=>step>0?setStep(step-1):onClose()} style={{ border:'none', background:'transparent', color:dim, cursor:'pointer', fontSize:10, letterSpacing:'0.32em', textTransform:'uppercase', fontWeight:500, fontFamily:grotesk }}>{step===0?'← Cancel':'← Back'}</button>
                {step<steps.length-1?(
                  <button disabled={!canNext} onClick={()=>setStep(step+1)} style={{ padding:'14px 24px', border:'none', background:canNext?accent:`${accent}33`, color:canNext?bg:dim, fontSize:10, letterSpacing:'0.32em', cursor:canNext?'pointer':'not-allowed', fontFamily:grotesk, fontWeight:500, textTransform:'uppercase', transition:'all .2s' }}>Continue →</button>
                ):(
                  <React.Fragment>
                    <button onClick={submit} disabled={submitting} style={{ padding:'14px 24px', border:'none', background:accent, color:bg, fontSize:10, letterSpacing:'0.32em', cursor:submitting?'wait':'pointer', fontWeight:500, fontFamily:grotesk, textTransform:'uppercase', opacity:submitting?0.7:1 }}>{submitting?'Sending…':'Send application →'}</button>
                    {submitError&&<span style={{ fontSize:11, color:'#c0392b', marginLeft:12 }}>Something went wrong — try again.</span>}
                  </React.Fragment>
                )}
              </div>
            )}
          </aside>
        </>
      );
    };

    // ─── FooterCol ──────────────────────────────────────────────────
    const FooterCol = ({ head, items }) => (
      <div>
        <div style={{ fontSize:9, color:T.silverFaint, letterSpacing:'0.4em', marginBottom:16, textTransform:'uppercase', fontWeight:500, fontFamily:grotesk }}>{head}</div>
        {items.map((it, i) => {
          if (typeof it === 'string') return <div key={i} style={{ color:T.silverLight, lineHeight:2, fontSize:12, fontFamily:grotesk }}>{it}</div>;
          return (
            <a key={i} href={it.href} target="_blank" rel="noopener noreferrer"
              style={{ display:'block', color:T.silverLight, lineHeight:2, fontSize:12, textDecoration:'none', transition:'color .2s', fontFamily:grotesk }}
              onMouseEnter={(e) => e.currentTarget.style.color = T.silver}
              onMouseLeave={(e) => e.currentTarget.style.color = T.silverLight}>
              {it.t}
            </a>
          );
        })}
      </div>
    );

    // ─── Hub Page ───────────────────────────────────────────────────
    const Hub = ({ onApply, onWaitlist }) => {
      const [scrolled, setScrolled] = useState(false);
      const [revealed, setRevealed] = useState({});
      const [time, setTime]         = useState('');
      const containerRef            = useRef(null);

      useEffect(() => {
        const tick = () => { const d = new Date(); setTime(`${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')} UTC`); };
        tick(); const t = setInterval(tick, 30000); return () => clearInterval(t);
      }, []);

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 24);
        window.addEventListener('scroll', onScroll, { passive:true });
        const io = new IntersectionObserver((es) => { es.forEach((e) => { if (e.isIntersecting) setRevealed((r) => ({ ...r, [e.target.dataset.reveal]:true })); }); }, { root:null, threshold:0.1 });
        const el = containerRef.current; if (el) el.querySelectorAll('[data-reveal]').forEach((n) => io.observe(n));
        return () => { window.removeEventListener('scroll', onScroll); io.disconnect(); };
      }, []);

      const reveal = (k) => ({ opacity:revealed[k]?1:0, transform:revealed[k]?'translateY(0)':'translateY(14px)', transition:'opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1)' });

      return (
        <div ref={containerRef} style={{ width:'100%', background:T.black, color:T.white, fontFamily:grotesk, position:'relative' }}>
          <NoiseDefs />

          {/* ── Meta strip ── */}
          <div style={{ position:'sticky', top:0, zIndex:11, display:'grid', gridTemplateColumns:'1fr 1fr 1fr', padding:'10px 24px', fontFamily:grotesk, fontSize:9, fontWeight:500, letterSpacing:'0.28em', textTransform:'uppercase', color:T.silverDim, background:'rgba(250,248,243,0.92)', backdropFilter:'blur(8px)', borderBottom:`1px solid ${T.silverFaint}55` }}>
            <span>Lliam Humphrey · South Africa</span>
            <span style={{ textAlign:'center', color:T.orange }}>Building in Public · Spring 2026</span>
            <span style={{ textAlign:'right' }}>{time}<span style={{ marginLeft:10, display:'inline-block', width:5, height:5, borderRadius:999, background:T.orange, verticalAlign:1 }}></span></span>
          </div>

          {/* ── Nav ── */}
          <PillNav onApply={onApply} scrolled={scrolled} />

          {/* ── HERO — photo background ── */}
          <header id="top" style={{ position:'relative', overflow:'hidden', textAlign:'center', minHeight:'100svh', display:'flex', alignItems:'center', justifyContent:'center', padding:'80px clamp(20px,4vw,48px)' }}>
            {/* Photo: the South Africa pool / building shot */}
            <img
              src="./assets/IMG_3526.jpg"
              alt=""
              aria-hidden="true"
              style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 30%', zIndex:0 }}
            />
            <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(8,14,11,0.52) 0%, rgba(8,14,11,0.68) 55%, rgba(8,14,11,0.88) 100%)', zIndex:1 }} />
            <NoiseBg opacity={0.05} />

            <div style={{ position:'relative', zIndex:2, maxWidth:860, marginInline:'auto', width:'100%' }}>
              <div style={{ display:'flex', justifyContent:'center', marginBottom:40 }}>
                <HeroMark />
              </div>
              <h1 style={{ fontFamily:grotesk, fontWeight:700, fontSize:'clamp(48px,8vw,120px)', lineHeight:0.93, letterSpacing:'-0.035em', margin:0, color:T.beige, textWrap:'balance' }}>
                Lliam Humphrey
              </h1>
              <p style={{ marginTop:28, fontFamily:grotesk, fontWeight:400, fontSize:'clamp(15px,2vw,20px)', letterSpacing:'0.04em', color:'rgba(242,233,216,0.75)', textWrap:'balance' }}>
                19. Building businesses in public from South Africa.
              </p>
              <p style={{ marginTop:12, fontFamily:serif, fontStyle:'italic', fontWeight:300, fontSize:'clamp(14px,1.6vw,18px)', color:'rgba(232,117,58,0.85)', letterSpacing:'0.04em' }}>
                Entrepreneur · Creative Director · Founder
              </p>
              <div style={{ marginTop:44, display:'flex', gap:14, justifyContent:'center', flexWrap:'wrap' }}>
                <button onClick={onApply} style={pillBtnLarge}>Apply to work together <span style={{ marginLeft:8 }}>→</span></button>
                <button onClick={onWaitlist} style={pillBtnGhost}>Join Private Victories Club</button>
              </div>
            </div>
          </header>

          {/* ── WHAT I'M BUILDING ── */}
          <section style={{ padding:'clamp(56px,7vw,96px) clamp(20px,3vw,32px)', borderTop:`1px solid ${T.silver}22`, position:'relative' }}>
            <div style={{ marginBottom:48 }}>
              <div style={{ fontSize:9, color:T.silverFaint, letterSpacing:'0.4em', textTransform:'uppercase', fontFamily:grotesk, marginBottom:16 }}>What I'm Building</div>
              <h2 style={{ fontFamily:grotesk, fontWeight:700, fontSize:'clamp(32px,5vw,64px)', letterSpacing:'-0.025em', margin:0, color:T.white, lineHeight:0.96, textTransform:'uppercase' }}>Three ventures.<br /><span style={{ fontFamily:serif, fontStyle:'italic', fontWeight:300, textTransform:'none', letterSpacing:'-0.015em', color:T.silver }}>One story.</span></h2>
            </div>

            <div data-reveal="cards" style={{ ...reveal('cards'), display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(min(100%, 300px), 1fr))', gap:16 }}>

              {/* Card 1 — Work With Me */}
              <HubCard
                num={1}
                eyebrow="Work With Me"
                title="1:1 Documentation Consulting"
                desc="I help founders document their journey and build a brand that compounds. One story, told consistently, over time."
                cta="Apply to work together"
                onCta={onApply}
                primary={true}
              />

              {/* Card 2 — Private Victories Club */}
              <HubCard
                num={2}
                eyebrow="Community"
                title="Private Victories Club"
                desc="A creative community for young creators and entrepreneurs building in public who want to make money from their content online."
                cta="Join the waitlist"
                onCta={onWaitlist}
                primary={false}
                bg="#0B0F1E"
                accent="#FFFFFF"
                ink="#FFFFFF"
                dim="rgba(255,255,255,0.5)"
              />

              {/* Card 3 — evverywhere */}
              <HubCard
                num={3}
                eyebrow="Agency"
                title="evverywhere"
                desc="AI systems and paid ads for companies ready to scale."
                cta="Visit evverywhere"
                ctaHref="https://www.evverywhere.com/"
                primary={false}
                bg="#E2D5C0"
                accent="#BF4535"
                ink="#1A1410"
                dim="#7A6A5A"
              />

            </div>
          </section>

          {/* ── Closing tagline ── */}
          <section style={{ padding:'clamp(80px,10vw,120px) clamp(20px,3vw,32px)', borderTop:`1px solid ${T.silver}22`, textAlign:'center', position:'relative', overflow:'hidden' }}>
            <NoiseBg opacity={0.04} />
            <div aria-hidden="true" style={{ position:'absolute', inset:0, pointerEvents:'none', background:`radial-gradient(50% 60% at 20% 30%, ${T.orange}22, transparent 70%), radial-gradient(40% 50% at 50% 100%, ${T.orangeSoft}2a, transparent 70%)` }} />
            <div style={{ position:'relative', zIndex:1 }}>
              <div style={{ fontSize:9, color:T.silverFaint, letterSpacing:'0.4em', marginBottom:28, textTransform:'uppercase', fontFamily:grotesk }}>An Invitation</div>
              <h2 style={{ fontFamily:serif, fontStyle:'italic', fontWeight:300, fontSize:'clamp(28px,5.4vw,76px)', lineHeight:1.18, letterSpacing:'-0.02em', margin:0, color:T.white, maxWidth:1100, marginInline:'auto' }}>
                The world doesn't need more content. <br />
                <span style={{ color:T.silver }}>It needs your story, told as it happens.</span>
              </h2>
              <div style={{ marginTop:48, display:'flex', gap:14, justifyContent:'center', flexWrap:'wrap' }}>
                <button onClick={onApply} style={pillBtnLarge}>Apply to work together <span style={{ marginLeft:8 }}>→</span></button>
              </div>
            </div>
          </section>

          {/* ── Footer ── */}
          <footer style={{ padding:'clamp(36px,5vw,48px) clamp(20px,3vw,32px) clamp(24px,3vw,32px)', borderTop:`1px solid ${T.silver}22`, background:T.navyDeep, position:'relative', overflow:'hidden' }}>
            <NoiseBg opacity={0.03} />
            <div style={{ position:'relative' }}>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:'clamp(28px,4vw,32px)', fontSize:12, color:T.silverDim }}>
                <div>
                  <div style={{ fontFamily:grotesk, fontSize:'clamp(16px,2vw,22px)', fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase', color:T.beige, marginBottom:14 }}>Lliam Humphrey</div>
                  <div style={{ fontFamily:serif, fontStyle:'italic', fontSize:15, color:T.silver, marginBottom:18 }}>Creative direction, est. MMXXIV.</div>
                  <div style={{ maxWidth:360, lineHeight:1.7, fontSize:12.5, color:T.silverDim, fontFamily:grotesk }}>Building in public from South Africa.</div>
                </div>
                <FooterCol head="Contact" items={['lliamhumphreywork@gmail.com']} />
                <FooterCol head="Elsewhere" items={[
                  { t:'Instagram — @lliam.humphrey', href:'https://instagram.com/lliam.humphrey' },
                  { t:'TikTok — @lliam.humphrey',    href:'https://tiktok.com/@lliam.humphrey' },
                ]} />
                <FooterCol head="Colophon" items={['South Africa, MMXXVI.']} />
              </div>
              <div style={{ marginTop:56, paddingTop:24, borderTop:`1px solid ${T.silver}18`, display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:10, color:T.silverFaint, letterSpacing:'0.32em', textTransform:'uppercase', fontFamily:grotesk, flexWrap:'wrap', gap:12 }}>
                <span>© MMXXVI · Lliam Humphrey · South Africa</span>
                <span>{time||'00:00 UTC'}</span>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    // ─── App ────────────────────────────────────────────────────────
    function App() {
      const [applyOpen,    setApplyOpen]    = useState(false);
      const [waitlistOpen, setWaitlistOpen] = useState(false);
      return (
        <>
          <Hub onApply={() => setApplyOpen(true)} onWaitlist={() => setWaitlistOpen(true)} />
          <ApplicationModal open={applyOpen}    onClose={() => setApplyOpen(false)} />
          <WaitlistModal     open={waitlistOpen} onClose={() => setWaitlistOpen(false)} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
