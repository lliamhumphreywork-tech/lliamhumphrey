<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lliam Humphrey — Creative Direction</title>
  <meta name="description" content="I help entrepreneurs document the work they're already doing and turn it into a brand that builds trust, attracts clients, and compounds over time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,700&family=Inter+Tight:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; }
    body { background: #FAF8F3; -webkit-font-smoothing: antialiased; }

    /* Mobile nav hamburger */
    .mobile-nav-open { display: none !important; }
    @media (max-width: 768px) {
      .pill-nav-links { display: none !important; }
      .mobile-menu-btn { display: flex !important; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ─── Palette ────────────────────────────────────────────────────
    const T = {
      black:      '#FAF8F3',
      navy:       '#F2E9D8',
      navyMid:    '#E8DDC4',
      navyDeep:   '#0F1A14',
      silver:     '#E8753A',
      silverLight:'#0F1A14',
      silverDim:  '#5C6B5F',
      silverFaint:'#A89F8A',
      white:      '#0F1A14',
      orange:     '#E8753A',
      orangeSoft: '#F2A06B',
      beige:      '#F2E9D8',
      beigeDeep:  '#E8DDC4',
    };

    const PVC = {
      black:    '#080808',
      navy:     '#0a1628',
      navyMid:  '#0f2040',
      silver:   '#a8b8c8',
      silverDim:'#5a6a7a',
      white:    '#f4f5f6',
    };

    const display = "'Fraunces', 'Cormorant Garamond', serif";
    const grotesk = "'Inter Tight', 'Space Grotesk', sans-serif";
    const serif   = "'Fraunces', 'Cormorant Garamond', serif";

    // ─── SVG noise / filter defs ───────────────────────────────────
    const NoiseDefs = () => (
      <svg width="0" height="0" style={{ position: 'absolute' }}>
        <filter id="nf-shared">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
          <feColorMatrix type="saturate" values="0" />
        </filter>
      </svg>
    );

    const NoiseBg = ({ opacity = 0.035 }) => (
      <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 0 }}>
        <rect width="100%" height="100%" filter="url(#nf-shared)" opacity={opacity} />
      </svg>
    );

    // ─── Halo ──────────────────────────────────────────────────────
    const Halo = ({ children, color = T.orange, size = 200, intensity = 0.55 }) => (
      <div style={{ position: 'relative', width: size, height: size }}>
        <div style={{
          position: 'absolute', inset: '-12%',
          background: `radial-gradient(circle at 50% 55%, ${color}${Math.round(intensity * 255).toString(16).padStart(2,'0')}, transparent 62%)`,
          filter: 'blur(28px)', pointerEvents: 'none',
        }} />
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {children}
        </div>
      </div>
    );

    // ─── Service icons ─────────────────────────────────────────────
    const IconCamera = ({ s = 110 }) => (
      <svg width={s} height={s} viewBox="0 0 120 120" fill="none" stroke={T.orange} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <rect x="18" y="38" width="84" height="56" rx="8" /><path d="M38 38 L46 28 H74 L82 38" />
        <circle cx="60" cy="66" r="16" /><circle cx="60" cy="66" r="9" stroke={T.orangeSoft} />
        <circle cx="86" cy="50" r="2" fill={T.orange} stroke="none" />
      </svg>
    );
    const IconSpine = ({ s = 110 }) => (
      <svg width={s} height={s} viewBox="0 0 120 120" fill="none" stroke={T.orange} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <path d="M30 22 Q60 60 30 98" /><path d="M90 22 Q60 60 90 98" stroke={T.orangeSoft} />
        <line x1="40" y1="34" x2="80" y2="34" /><line x1="46" y1="50" x2="74" y2="50" />
        <line x1="48" y1="66" x2="72" y2="66" /><line x1="46" y1="82" x2="74" y2="82" />
        <circle cx="60" cy="60" r="3" fill={T.orange} stroke="none" />
      </svg>
    );
    const IconMic = ({ s = 110 }) => (
      <svg width={s} height={s} viewBox="0 0 120 120" fill="none" stroke={T.orange} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <rect x="48" y="22" width="24" height="50" rx="12" />
        <path d="M34 60 Q34 86 60 86 Q86 86 86 60" />
        <line x1="60" y1="86" x2="60" y2="100" /><line x1="48" y1="100" x2="72" y2="100" />
        {[18,26,34,42,50].map((x,i) => <line key={i} x1={x} y1={50-i*2} x2={x} y2={70+i*2} stroke={T.orangeSoft} strokeWidth="1.2" />)}
        {[70,78,86,94,102].map((x,i) => <line key={i} x1={x} y1={50-i*2} x2={x} y2={70+i*2} stroke={T.orangeSoft} strokeWidth="1.2" />)}
      </svg>
    );
    const IconMark = ({ s = 110 }) => (
      <svg width={s} height={s} viewBox="0 0 120 120" fill="none" stroke={T.orange} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        <rect x="22" y="22" width="76" height="76" rx="14" /><path d="M22 38 H98" />
        <path d="M44 56 V84" /><path d="M44 84 H76 V56" stroke={T.orangeSoft} />
        <circle cx="60" cy="62" r="4" fill={T.orange} stroke="none" />
      </svg>
    );

    const SERVICE_ICONS = {
      'Story Spine':        IconSpine,
      'Documenting System': IconCamera,
      'Voice & Editing':    IconMic,
      'Visual Identity':    IconMark,
    };

    // ─── ServiceCard ───────────────────────────────────────────────
    const ServiceCard = ({ title, body, tags, idx }) => {
      const Icon = SERVICE_ICONS[title] || IconMark;
      return (
        <div style={{
          position: 'relative', overflow: 'hidden',
          padding: 'clamp(24px, 3vw, 40px)',
          borderRadius: 28, minHeight: 320,
          background: `linear-gradient(165deg, ${T.beige}cc 0%, ${T.beigeDeep}99 100%)`,
          border: `1px solid ${T.silver}33`,
          boxShadow: `0 1px 0 #ffffff77 inset, 0 30px 60px -30px ${T.navyDeep}22`,
          display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 24, alignItems: 'center',
        }}>
          <div>
            <div style={{ fontSize: 9, color: T.silver, letterSpacing: '0.4em', textTransform: 'uppercase', marginBottom: 18, fontWeight: 600, fontFamily: grotesk }}>
              0{idx + 1} · Service
            </div>
            <h3 style={{ fontFamily: grotesk, fontSize: 'clamp(22px, 2.5vw, 32px)', fontWeight: 700, letterSpacing: '-0.015em', margin: 0, color: T.white, lineHeight: 1.05, textWrap: 'balance' }}>{title}</h3>
            <p style={{ marginTop: 14, fontSize: 14, lineHeight: 1.75, color: T.silverLight, fontFamily: grotesk }}>{body}</p>
            <div style={{ marginTop: 20, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {tags.map((t) => (
                <span key={t} style={{ fontSize: 9, padding: '5px 11px', borderRadius: 999, border: `1px solid ${T.silver}55`, color: T.silver, letterSpacing: '0.16em', textTransform: 'uppercase', background: `${T.beige}66`, fontFamily: grotesk }}>{t}</span>
              ))}
            </div>
          </div>
          <div style={{ justifySelf: 'end', alignSelf: 'center' }}>
            <Halo color={T.orange} size={160}><Icon s={110} /></Halo>
          </div>
        </div>
      );
    };

    // ─── HeroMark ──────────────────────────────────────────────────
    const HeroMark = () => (
      <div style={{
        width: 120, height: 120, borderRadius: 30, position: 'relative',
        background: `linear-gradient(155deg, rgba(242,233,216,0.18) 0%, rgba(232,221,196,0.12) 100%)`,
        border: `1px solid rgba(232,117,58,0.4)`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: `0 40px 120px -30px ${T.orange}44, inset 0 1px 0 rgba(255,255,255,0.2)`,
        backdropFilter: 'blur(8px)',
      }}>
        <span style={{ position: 'absolute', inset: 6, borderRadius: 24, background: `radial-gradient(circle at 50% 80%, ${T.orange}22, transparent 65%)`, pointerEvents: 'none' }} />
        <span style={{ position: 'absolute', top: 13, left: 0, right: 0, textAlign: 'center', fontSize: 8, color: 'rgba(242,233,216,0.55)', letterSpacing: '0.4em', textTransform: 'uppercase', fontWeight: 600, fontFamily: grotesk }}>est · mmxxiv</span>
        <span style={{ fontFamily: grotesk, fontSize: 48, fontWeight: 700, letterSpacing: '0.12em', color: T.beige, position: 'relative', marginTop: 14 }}>LH</span>
      </div>
    );

    // ─── Wordmark ──────────────────────────────────────────────────
    const Wordmark = () => (
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        <span style={{ width: 28, height: 28, background: T.navy, position: 'relative', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <span style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 1.5, background: T.silver }}></span>
          <span style={{ fontFamily: grotesk, fontSize: 8.5, fontWeight: 700, letterSpacing: 1.2, color: T.white }}>LH</span>
        </span>
        <span style={{ fontFamily: grotesk, fontSize: 13, fontWeight: 700, letterSpacing: '0.32em', color: T.white, textTransform: 'uppercase' }}>Lliam Humphrey</span>
      </div>
    );

    // ─── Button styles ─────────────────────────────────────────────
    const pillBtnPrimary = { fontFamily: grotesk, fontSize: 11, fontWeight: 500, padding: '12px 22px', border: 'none', borderRadius: 999, background: T.orange, color: T.beige, cursor: 'pointer', letterSpacing: '0.2em', textTransform: 'uppercase', boxShadow: `0 1px 0 #ffffff44 inset, 0 12px 30px -10px ${T.orange}88`, transition: 'transform .2s, box-shadow .2s' };
    const pillBtnLarge  = { ...pillBtnPrimary, fontSize: 12, padding: '17px 32px' };
    const pillBtnGhost  = { fontFamily: grotesk, fontSize: 12, fontWeight: 500, padding: '17px 32px', borderRadius: 999, background: `linear-gradient(180deg, rgba(232,221,196,0.25), rgba(242,233,216,0.2))`, border: `1px solid rgba(242,233,216,0.35)`, color: T.beige, cursor: 'pointer', textDecoration: 'none', letterSpacing: '0.2em', textTransform: 'uppercase', boxShadow: `0 1px 0 rgba(255,255,255,0.15) inset`, display: 'inline-block', backdropFilter: 'blur(8px)' };
    const ctaBtnB       = { fontFamily: grotesk, fontSize: 11, fontWeight: 500, padding: '15px 26px', border: 'none', background: T.silver, color: T.black, cursor: 'pointer', letterSpacing: '0.32em', textTransform: 'uppercase', transition: 'transform .2s, background .2s' };

    // ─── PillNav ───────────────────────────────────────────────────
    const PillNav = ({ onApply, scrolled, menuOpen, setMenuOpen }) => {
      const items = [
        { id: 'home',     label: 'Home',    href: '#top' },
        { id: 'about',    label: 'About',   href: '#about' },
        { id: 'practice', label: 'Method',  href: '#practice' },
        { id: 'work',     label: 'Work',    href: '#work' },
      ];
      return (
        <>
          <nav style={{
            position: 'sticky', top: 33, zIndex: 10, padding: '14px 24px',
            display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', gap: 16,
            background: scrolled ? 'rgba(250,248,243,0.88)' : 'transparent',
            backdropFilter: scrolled ? 'blur(14px)' : 'none',
            borderBottom: scrolled ? `1px solid ${T.silverFaint}44` : '1px solid transparent',
            transition: 'all .3s',
          }}>
            <Wordmark />

            {/* Desktop pill links */}
            <div className="pill-nav-links" style={{ display: 'flex', alignItems: 'center', padding: 5, gap: 2, background: `linear-gradient(180deg, ${T.beigeDeep}aa, ${T.beige}99)`, border: `1px solid ${T.silver}33`, borderRadius: 999, boxShadow: `0 1px 0 #ffffff77 inset, 0 8px 24px -12px ${T.navyDeep}22`, backdropFilter: 'blur(8px)' }}>
              {items.map((i) => (
                <a key={i.id} href={i.href} style={{ padding: '9px 20px', fontSize: 11, fontWeight: 500, letterSpacing: '0.18em', textTransform: 'uppercase', color: T.silverDim, textDecoration: 'none', borderRadius: 999, border: '1px solid transparent', transition: 'all .25s', fontFamily: grotesk }}
                  onMouseEnter={(e) => { e.currentTarget.style.color = T.white; e.currentTarget.style.background = `linear-gradient(180deg, ${T.beige}, ${T.beigeDeep})`; }}
                  onMouseLeave={(e) => { e.currentTarget.style.color = T.silverDim; e.currentTarget.style.background = 'transparent'; }}>
                  {i.label}
                </a>
              ))}
            </div>

            <div style={{ justifySelf: 'end', display: 'flex', alignItems: 'center', gap: 12 }}>
              <button onClick={onApply} style={pillBtnPrimary}>Apply <span style={{ marginLeft: 8 }}>→</span></button>
              {/* Mobile hamburger */}
              <button className="mobile-menu-btn" onClick={() => setMenuOpen(!menuOpen)} style={{ display: 'none', flexDirection: 'column', gap: 5, background: 'transparent', border: 'none', cursor: 'pointer', padding: 6 }}>
                <span style={{ width: 22, height: 1.5, background: T.white, display: 'block', transition: 'all .2s', transform: menuOpen ? 'rotate(45deg) translate(4px, 4px)' : 'none' }}></span>
                <span style={{ width: 22, height: 1.5, background: T.white, display: 'block', opacity: menuOpen ? 0 : 1, transition: 'all .2s' }}></span>
                <span style={{ width: 22, height: 1.5, background: T.white, display: 'block', transition: 'all .2s', transform: menuOpen ? 'rotate(-45deg) translate(4px, -4px)' : 'none' }}></span>
              </button>
            </div>
          </nav>

          {/* Mobile menu drawer */}
          {menuOpen && (
            <div style={{ position: 'sticky', top: 33, zIndex: 9, background: 'rgba(250,248,243,0.97)', backdropFilter: 'blur(14px)', borderBottom: `1px solid ${T.silverFaint}44`, padding: '8px 24px 20px' }}>
              {items.map((i) => (
                <a key={i.id} href={i.href} onClick={() => setMenuOpen(false)} style={{ display: 'block', padding: '14px 0', fontSize: 13, fontWeight: 500, letterSpacing: '0.18em', textTransform: 'uppercase', color: T.white, textDecoration: 'none', borderBottom: `1px solid ${T.silverFaint}33`, fontFamily: grotesk }}>{i.label}</a>
              ))}
            </div>
          )}
        </>
      );
    };

    // ─── SpecHead ─────────────────────────────────────────────────
    const SpecHead = ({ num, title, subtitle, right }) => (
      <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: 24, alignItems: 'baseline', paddingTop: 8 }}>
        <div style={{ fontSize: 10, color: T.silverFaint, letterSpacing: '0.32em', fontFamily: grotesk, minWidth: 36 }}>{num}</div>
        <div>
          <h2 style={{ fontFamily: grotesk, fontSize: 'clamp(28px, 4.4vw, 60px)', fontWeight: 700, letterSpacing: '-0.02em', margin: 0, lineHeight: 1, textTransform: 'uppercase', color: T.white }}>{title}</h2>
          {subtitle && <div style={{ marginTop: 12, fontFamily: serif, fontStyle: 'italic', fontWeight: 300, fontSize: 16, color: T.silver }}>{subtitle}</div>}
        </div>
        {right && <div>{right}</div>}
      </div>
    );

    // ─── PVC Case Study ───────────────────────────────────────────
    const PVCCase = ({ onApply }) => (
      <div style={{ border: `1px solid ${T.silver}22`, background: T.navy, position: 'relative', overflow: 'hidden' }}>
        <NoiseBg opacity={0.03} />
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: T.silver }} />

        {/* Header */}
        <div style={{ padding: 'clamp(20px,3vw,32px)', borderBottom: `1px solid ${T.silver}22`, display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: 24, alignItems: 'baseline', position: 'relative', flexWrap: 'wrap' }}>
          <div style={{ fontSize: 10, color: T.silverFaint, letterSpacing: '0.32em', fontFamily: grotesk }}>01</div>
          <div>
            <div style={{ fontSize: 10, color: T.silver, letterSpacing: '0.4em', marginBottom: 10, textTransform: 'uppercase', fontFamily: grotesk }}>Documented Case Study</div>
            <h3 style={{ fontFamily: grotesk, fontSize: 'clamp(26px, 4.4vw, 56px)', fontWeight: 700, letterSpacing: '-0.018em', margin: 0, lineHeight: 0.96, textTransform: 'uppercase', color: T.white }}>Private Victories Club</h3>
            <div style={{ marginTop: 10, fontFamily: serif, fontStyle: 'italic', fontSize: 16, color: T.silver }}>A founder's year, documented — not performed.</div>
          </div>
          <div style={{ textAlign: 'right', fontSize: 10, color: T.silverDim, letterSpacing: '0.32em', textTransform: 'uppercase', lineHeight: 1.9, fontFamily: grotesk }}>
            MMXXIV<br /><span style={{ color: T.silverFaint }}>Founding identity</span>
          </div>
        </div>

        {/* Hero plate — IMG_2220.jpg as background with overlay */}
        <div style={{ padding: '64px clamp(20px,3vw,32px)', position: 'relative', overflow: 'hidden', borderBottom: `1px solid ${T.silver}22`, minHeight: 300 }}>
          {/* IMG_2220.jpg — moody studio background image */}
          <img src="./assets/IMG_2220.jpg" alt="" aria-hidden="true" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center', zIndex: 0 }} />
          {/* Moody overlay — preserves editorial feel */}
          <div style={{ position: 'absolute', inset: 0, background: 'rgba(8,8,8,0.72)', zIndex: 1 }} />
          <NoiseBg opacity={0.05} />
          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 1.5, background: T.silver, zIndex: 2 }} />
          {/* Hash marks bottom */}
          <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, display: 'flex', gap: 18, zIndex: 2 }}>
            {Array.from({ length: 40 }).map((_,i) => (
              <span key={i} style={{ width: 1, height: i%5===0?10:5, background: T.silver, opacity: i%5===0?0.4:0.18 }}></span>
            ))}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0, position: 'relative', zIndex: 3, padding: '24px 0' }}>
            <div style={{ fontFamily: grotesk, fontSize: 'clamp(40px, 7vw, 110px)', fontWeight: 700, letterSpacing: '0.18em', color: PVC.white, lineHeight: 1, textTransform: 'uppercase' }}>Private</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 16, margin: '14px 0', width: 'min(560px, 80%)' }}>
              <div style={{ flex: 1, height: 1, background: PVC.silver, opacity: 0.5 }}></div>
              <div style={{ fontSize: 9, color: PVC.silver, letterSpacing: '0.5em', textTransform: 'uppercase', fontWeight: 500, fontFamily: grotesk }}>Est. MMXXIV</div>
              <div style={{ flex: 1, height: 1, background: PVC.silver, opacity: 0.5 }}></div>
            </div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 16, flexWrap: 'wrap', justifyContent: 'center' }}>
              <div style={{ fontFamily: grotesk, fontSize: 'clamp(40px, 7vw, 110px)', fontWeight: 300, letterSpacing: '0.18em', color: PVC.white, lineHeight: 1, textTransform: 'uppercase' }}>Victories</div>
              <div style={{ fontFamily: grotesk, fontSize: 'clamp(16px, 2vw, 30px)', fontWeight: 500, letterSpacing: '0.4em', color: PVC.silver, textTransform: 'uppercase', alignSelf: 'flex-end', paddingBottom: 6 }}>Club</div>
            </div>
            <div style={{ marginTop: 32, fontFamily: serif, fontStyle: 'italic', fontSize: 16, color: 'rgba(168,184,200,0.7)', textAlign: 'center', letterSpacing: '0.04em' }}>
              "The world doesn't know yet. But you will."
            </div>
          </div>
        </div>

        {/* Brief & artefacts */}
        <div style={{ padding: 'clamp(24px,3vw,40px) clamp(20px,3vw,32px)', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 'clamp(24px,4vw,56px)', position: 'relative' }}>
          <div>
            <div style={{ fontSize: 9, color: T.silver, letterSpacing: '0.4em', marginBottom: 16, textTransform: 'uppercase', fontFamily: grotesk }}>The Brief</div>
            <p style={{ fontFamily: serif, fontStyle: 'italic', fontSize: 19, lineHeight: 1.55, color: T.white, margin: 0 }}>
              Built the full brand identity for a private members club for young South African entrepreneurs — from the name and wordmark to the website and founding story. No content strategy. Just a camera pointed at the work.
            </p>
            <div style={{ marginTop: 32, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }}>
              {[['Scope','Identity · Web · Social · Member Card · Email'],['Duration','10 weeks'],['Role','Creative direction, identity, voice'],['Outcome','Launching MMXXVI']].map(([k,v]) => (
                <div key={k} style={{ borderTop: `1px solid ${T.silver}33`, paddingTop: 12 }}>
                  <div style={{ color: T.silverFaint, letterSpacing: '0.32em', textTransform: 'uppercase', marginBottom: 6, fontSize: 9, fontFamily: grotesk }}>{k}</div>
                  <div style={{ color: k==='Outcome'?T.silver:T.white, fontFamily: serif, fontStyle: 'italic', fontSize: 14 }}>{v}</div>
                </div>
              ))}
            </div>
          </div>
          {/* Artefact grid */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gridTemplateRows: 'auto auto', gap: 12 }}>
            {/* Member card */}
            <div style={{ gridColumn: 'span 2', background: PVC.navyMid, position: 'relative', overflow: 'hidden', aspectRatio: '21/9', display: 'flex', alignItems: 'center', justifyContent: 'center', border: `1px solid ${PVC.silver}18` }}>
              <NoiseBg opacity={0.04} />

          {/* ── ABOUT ── */}

              {/* Right: media stack — portrait video + lifestyle still */}

                  <div style={{ position:'absolute', bottom:14, left:18, fontSize:8, color:'rgba(242,233,216,0.6)', letterSpacing:'0.28em', textTransform:'uppercase', fontFamily:grotesk }}>From the studio — South Africa</div>

                    {["You want viral content without substance behind it",

                  <div style={{ fontFamily:grotesk, fontSize:'clamp(16px,2vw,22px)', fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase', color:T.beige, marginBottom:14 }}>Lliam Humphrey</div>

                  { t:'@lliamhumphrey (TikTok)',     href:'https://www.tiktok.com/@lliamhumphrey' },

    // ─── App ───────────────────────────────────────────────────────
    function App() {
      const [open, setOpen] = useState(false);
      return (
        <>
          <DirectionB onApply={() => setOpen(true)} />
          <ApplicationModal open={open} onClose={() => setOpen(false)} />

    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
